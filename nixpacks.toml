[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.build]
cmds = [
    "cd frontend && npm ci && npm run build",
    "mkdir -p backend/static",
    "cp -r frontend/dist/. backend/static/"
]

[start]
cmd = "cd backend && alembic upgrade head && python seed.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
